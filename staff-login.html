<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login - Smart Lab Portal</title>
<link rel="stylesheet" href="landing.css">
</head>

<body>

<section class="login-page">

  <a href="Landing.html" class="back-home">← Back to Home</a>

  <div class="login-box">

    <div class="login-top">
      <!-- <div class="login-icon staff-icon">🖥️</div> -->
      <h1>Staff Portal</h1>
      <p>Log in with your staff institute email</p>
    </div>

    <div class="login-card">
      <h2>Staff Access</h2>
      <p>Enter your credentials to manage labs</p>

      <form id="staffLoginForm">

        <label>Email Address</label>
        <input type="email" id="staffEmail" placeholder="sakshi.kumari@nitjsr.ac.in">

        <label>Password</label>
        <input type="password" id="staffPassword" placeholder="••••••••">

        <button type="submit" class="login-btn staff-btn">Sign In</button>

      </form>

      <div class="switch-login">
        Student?
        <a href="student-login.html">Log in here</a>
      </div>

    </div>

  </div>

</section>

<script src="landing.js"></script>
</body>
</html>
